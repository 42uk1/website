---
layout: none
title: "雑記"
---

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Meiryo", "Yu Gothic", sans-serif;
  background: #fff;
  color: #222;
}

/* 左寄せレイアウト */
.container {
  max-width: 720px;
  margin: 40px 20px; /* 中央寄せ解除 */
  padding: 0 20px;
}

/* タイトル */
h1 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* 説明 */
.desc {
  margin-bottom: 20px;
  color: #444;
}

/* 記事 */
details {
  margin-bottom: 18px;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

/* 開いた時の余白 */
details[open] summary {
  margin-bottom: 10px;
}

/* 本文を1段下げる（重要） */
details p {
  margin-top: 6px;
  padding-left: 16px;   /* ← marginではなくpadding */
  border-left: 2px solid transparent; /* 見えないけど段差が出る */
}

/* リンク */
a {
  color: #222;
  text-decoration: underline;
}

a:hover {
  color: #000;
}

</style>
</head>

<body>

<div class="container">

<h1>{{ page.title }}</h1>

<div class="desc">
タイトルを押すと詳細が開きます<br>

</div>

{% for post in site.categories.zatsuki %}
<details>
  <summary>{{ post.date | date: "%Y-%m-%d" }} {{ post.title }}</summary>
  <p>{{ post.content }}</p>
</details>
{% endfor %}



</div>

</body>
</html>

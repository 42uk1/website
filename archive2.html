---
layout: none
title: "保管庫2"
---

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #ffffff;
  color: #2f8b57;
  font-family: "Meiryo", "Yu Gothic", sans-serif;
  margin: 30px 20px; /* 左寄せ */
  max-width: 600px;
  line-height: 1.7;
  font-size: 14px;
}

/* タイトル */
h1 {
  font-size: 20px;
  margin-bottom: 12px;
  font-weight: normal;
}

/* 説明 */
.desc {
  margin-bottom: 16px;
}

/* 記事 */
details {
  margin-bottom: 10px;
}

summary {
  cursor: pointer;
  text-decoration: underline;
}

summary:hover {
  background:#2f8b57;
  color:#ffffff;
}

details p {
  margin: 6px 0 10px 0;
  color: #333;
  white-space: pre-wrap;
}

/* リンク（見えるようにする） */
a:link { 
  color:#2f8b57; 
  text-decoration: underline;
}
a:visited { 
  color:#1b4d3e; 
}
a:hover { 
  color:#ffffff;
  background:#2f8b57;
}
a:active { 
  color:#ff6600; 
}

</style>
</head>

<body>

<h1>{{ page.title }}</h1>

<div class="desc">
note投稿タイミングを失ったものなど<br>
タイトルを押すと詳細が開きます
</div>

{% for post in site.categories.zatsuki %}
<details>
  <summary>{{ post.date | date: "%Y-%m-%d" }} {{ post.title }}</summary>
  <p>{{ post.content }}</p>
</details>
{% endfor %}

<br>


</body>
</html>

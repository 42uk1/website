---
layout: none
title: "保管庫1"
---

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #fff;
  color: #222;
  font-family: "Meiryo", "Yu Gothic", sans-serif;
  margin: 40px auto;
  max-width: 680px;
  line-height: 1.8;
  font-size: 15px;
}

/* タイトル */
h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* 説明 */
.desc {
  margin-bottom: 20px;
  color: #444;
}

/* 記事 */
details {
  margin-bottom: 12px;
}

summary {
  cursor: pointer;
  font-weight: 600;
}

details p {
  margin: 8px 0;
  color: #222;
  white-space: pre-wrap;
}

/* リンク */
a {
  color: #222;
  text-decoration: underline;
}

a:hover {
  color: #000;
}

</style>
</head>

<body>

<h1>{{ page.title }}</h1>

<div class="desc">
タイトルを押すと詳細が開きます
</div>

{% for post in site.categories.note %}
<details>
  <summary>{{ post.date | date: "%Y-%m-%d" }} {{ post.title }}</summary>
  <p>{{ post.content }}</p>
</details>
{% endfor %}

<br>

<a href="index.html">← トップに戻る</a>

</body>
</html>

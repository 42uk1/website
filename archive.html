---
layout: none
title: "エンタメ感想"
---

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Meiryo", "Yu Gothic", sans-serif;
  background: #fff;
  color: #222;
}

/* レイアウト */
.container {
  max-width: 720px;
  margin: 40px 20px;
  padding: 0 20px;
}

/* タイトル */
h1 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* 説明 */
.desc {
  margin-bottom: 32px;
  color: #444;
}

/* 記事 */
details {
  margin-bottom: 18px;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

/* 開いた時の余白 */
details[open] summary {
  margin-bottom: 10px;
}

/* 本文を1段下げる（重要） */
details p {
  margin-top: 6px;
  margin-left: 18px;   /* ← これで階層を作る */
}

/* summary */
summary {
  cursor: pointer;
}

/* タイトル */
summary .title {
  font-weight: 500;
}

/* 日付 */
summary .date {
  font-size: 12px;
  color: #777;
  margin-left: 8px;
}

/* 本文 */
details p {
  margin: 8px 0;
  color: #222;
  white-space: pre-wrap;
}

/* リンク */
a {
  color: #222;
  text-decoration: underline;
}

a:hover {
  color: #000;
}

</style>
</head>

<body>

<div class="container">

<h1>{{ page.title }}</h1>

<div class="desc">
タイトルを押すと詳細が開きます
</div>

{% for post in site.categories.note %}
<details>
  <summary>
    <span class="title">{{ post.title }}</span>
    <span class="date">{{ post.date | date: "%Y-%m-%d" }}</span>
  </summary>
  <p>{{ post.content }}</p>
</details>
{% endfor %}

</div>

</body>
</html>
